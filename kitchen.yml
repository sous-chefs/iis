driver:
  name: vagrant
  boot_timeout: 900
  customize:
    cpus: 2
    memory: 4096

transport:
  name: winrm
  elevated: true

provisioner:
  name: chef_zero
  deprecations_as_errors: true
  product_name: chef
  channel: stable
  chef_license: accept

verifier:
  name: inspec

platforms:
  - name: windows-2016
    driver_config:
      box: tas50/windows_2016
  - name: windows-2019
    driver_config:
      box: tas50/windows_2019

suites:
  - name: default
    run_list:
      - recipe[test::default]
  - name: disable_default
    run_list:
      - recipe[test::disable_default]
  - name: app
    run_list:
      - recipe[test::app]
  - name: config_property
    run_list:
      - recipe[test::config_property]
  - name: manager
    run_list:
      - recipe[test::manager]
  - name: manager_permission
    run_list:
      - recipe[test::manager_permission]
  - name: module
    run_list:
      - recipe[test::module]
  - name: pool
    run_list:
      - recipe[test::pool]
  - name: root
    run_list:
      - recipe[test::root]
  - name: section
    run_list:
      - recipe[test::section]
  - name: site
    run_list:
      - recipe[test::site]
  - name: vdir
    run_list:
      - recipe[test::vdir]
  - name: default_powershell
    run_list:
      - recipe[test::default_powershell]
    verifier:
      inspec_tests:
        - test/integration/default/spec
  - name: site_powershell
    run_list:
      - recipe[test::site_powershell]
    verifier:
      inspec_tests:
        - test/integration/site
